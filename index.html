function diasEnMes(yy, mm){
  // yy: 2 dígitos (ej "26"), mm: 2 dígitos (ej "04")
  return new Date(2000+parseInt(yy), parseInt(mm), 0).getDate();
}

function parseFecha(fecha){
  // fecha formato DD/MM/YY → {dd, mm, yy}
  var p=fecha.split('/');
  return {dd:parseInt(p[0]),mm:p[1],yy:p[2]};
}

function esMismoMes(fecha, mm, yy){
  var f=parseFecha(fecha);
  return f.mm===mm && f.yy===yy;
}

function autoAsignar(pacs){
  var a={};

  // Mes y año actuales
  var hoy=new Date();
  var mmHoy=String(hoy.getMonth()+1).padStart(2,'0');
  var yyHoy=String(hoy.getFullYear()).slice(2);

  // Acumulador limpio — solo cuenta lo que se asigna en esta pasada
  // No usa asignaciones previas de Firebase para evitar sesgos
  var acum={ortega:0, medina:0, arevalo:0};

  pacs.forEach(function(p){
    var s=(p.servicio||'').toUpperCase();
    var rm=s.indexOf('IRM')>=0||s.indexOf('RESONAN')>=0||s.indexOf('RESONADOR')>=0;
    if(rm){
      a[p.orden]='medina';
      if(esMismoMes(p.fecha, mmHoy, yyHoy)) acum.medina+=(p.codigos?p.codigos.length:0);
      return;
    }

    var nCods=p.codigos?p.codigos.length:1;

    // Distribuir siempre en proporción fija entre los 3 médicos
    // Proporción: ortega 44% : medina 30% : arevalo 26%
    // (basado en cuotas 220:150:130)
    // El que tenga menor proporción relativa recibe el próximo estudio
    var total = acum.ortega + acum.medina + acum.arevalo + 0.001;
    var propOrtega = acum.ortega / total;
    var propMedina = acum.medina / total;
    var propArevalo = acum.arevalo / total;

    var TARGET_ORTEGA = 0.44;
    var TARGET_MEDINA = 0.30;
    var TARGET_AREVALO = 0.26;

    var defOrtega = TARGET_ORTEGA - propOrtega;
    var defMedina = TARGET_MEDINA - propMedina;
    var defArevalo = TARGET_AREVALO - propArevalo;

    var elegido;
    if(defOrtega >= defMedina && defOrtega >= defArevalo){
      elegido='ortega';
    } else if(defMedina >= defOrtega && defMedina >= defArevalo){
      elegido='medina';
    } else {
      elegido='arevalo';
    }

    a[p.orden]=elegido;
    acum[elegido]+=nCods;
  });
  return a;
}

async function loadFromFirebase(){
  // Cargar asignaciones
  try {
    const snapA = await getDoc(DOC_ASIG);
    asignaciones = snapA.exists() ? snapA.data() : {};

  // Cargar overrides
  try {
    const snapO = await getDoc(DOC_OVER);
    overrides = snapO.exists() ? snapO.data() : {};
  } catch(e){ overrides={}; }

  // Cargar estados con reintentos — nunca dejar estadoMap vacío si hubo datos antes
  var estadoCargado = false;
  for(var intento=0; intento<3; intento++){
    try {
      const snapE = await getDoc(DOC_ESTADO);
      if(snapE.exists()){
        estadoMap = snapE.data();
        estadoCargado = true;
        break;
      } else {
        estadoMap = {};
        estadoCargado = true;
        break;
      }
    } catch(e){
      if(intento < 2) await new Promise(r=>setTimeout(r, 1500));
    }
  }
  if(!estadoCargado){
    // Si falló 3 veces, intentar usar el respaldo de sessionStorage
    try {
      var backup = sessionStorage.getItem('estadoMap_backup');
      if(backup){ estadoMap = JSON.parse(backup); console.warn('estadoMap cargado desde respaldo local'); }
    } catch(e){}
  } else {
    // Actualizar respaldo local con datos frescos de Firebase
    try { sessionStorage.setItem('estadoMap_backup', JSON.stringify(estadoMap)); } catch(e){}
  }

  // Cargar pacientes extra
  try {
    const snapP = await getDoc(DOC_PACS);
    var extra = [];
    try {
      if(snapP.exists() && snapP.data().lista && Array.isArray(snapP.data().lista)){
        extra = snapP.data().lista;
      }
    } catch(e){ extra = []; }
    pacientes = PACS_DEFAULT.slice();
    var ordenes = new Set(pacientes.map(p=>p.orden));
    extra.forEach(function(p){ if(p && p.orden && !ordenes.has(p.orden)) pacientes.push(p); });
  } catch(e){ pacientes = PACS_DEFAULT.slice(); }

  // Aplicar estados a pacientes
  pacientes.forEach(function(p){
    p.estado = estadoMap[p.orden] || '';
  });

  // Auto-asignar los que no tienen asignación
  var auto = autoAsignar(pacientes);
  pacientes.forEach(function(p){
    if(!asignaciones[p.orden]) asignaciones[p.orden] = auto[p.orden];
  });
  // Aplicar overrides
  Object.keys(overrides).forEach(function(k){ asignaciones[k]=overrides[k]; });
}

async function saveAsignaciones(){
  try { await setDoc(DOC_ASIG, asignaciones); } catch(e){ console.error('Error guardando asignaciones',e); }
}
async function saveOverrides(){
  try { await setDoc(DOC_OVER, overrides); } catch(e){ console.error('Error guardando overrides',e); }
}
async function saveEstado(orden, estado){
  estadoMap[orden] = estado;
  try { await setDoc(DOC_ESTADO, estadoMap); } catch(e){ console.error('Error guardando estado',e); }
  // Respaldo local
  try { sessionStorage.setItem('estadoMap_backup', JSON.stringify(estadoMap)); } catch(e){}
}
async function savePacientesExtra(){
  // Guardar TODOS los informados sin excepción
  var informados = pacientes.filter(function(p){
    return estadoMap[p.orden] === 'informado';
  });
  try { await setDoc(DOC_PACS, {lista: informados}); } catch(e){ console.error('Error guardando pacientes',e); }
}

async function saveInformadoEnFirebase(p){
  if(!p) return;
  try {
    const snap = await getDoc(DOC_PACS);
    var lista = [];
    if(snap.exists() && snap.data().lista && Array.isArray(snap.data().lista)){
      lista = snap.data().lista;
    }
    var yaEsta = lista.find(function(x){return x.orden===p.orden;});
    if(!yaEsta){
      lista.push({orden:p.orden, fecha:p.fecha, nombre:p.nombre, servicio:p.servicio, atencion:p.atencion||'', codigos:p.codigos||[]});
      await setDoc(DOC_PACS, {lista: lista});
    }
  } catch(e){ console.error('Error guardando informado',e); }
}

// Listener en tiempo real — cuando Firebase cambia, re-renderiza
function startLiveSync(){
  if(unsubscribe) unsubscribe();
  // Escuchar cambios en el documento de estados
  unsubscribe = onSnapshot(DOC_ESTADO, function(snap){
    if(!snap.exists()) return;
    var newEstados = snap.data();
    var changed = false;
    pacientes.forEach(function(p){
      var newE = newEstados[p.orden]||'';
      if(p.estado !== newE){ p.estado=newE; changed=true; }
    });
    estadoMap = newEstados;
    if(changed && currentUser){
      if(UROLES[currentUser].rol==='admin') renderAdmin(currentAdminTab);
      else renderMedico();
    }
  });
}

async function reaplicar(){
  // Distribución proporcional 44/30/26
  // RESPETA asignaciones existentes — solo asigna los estudios SIN médico todavía
  var acum={ortega:0,medina:0,arevalo:0};

  // Paso 1: contabilizar lo que ya está asignado
  pacientes.forEach(function(p){
    var med=asignaciones[p.orden];
    if(med && acum[med]!==undefined){
      acum[med]+=(p.codigos?p.codigos.length:1);
    }
  });

  // Paso 2: asignar solo los estudios sin médico
  pacientes.forEach(function(p){
    if(asignaciones[p.orden]) return; // ya tiene médico, respetar
    var s=(p.servicio||'').toUpperCase();
    var rm=s.indexOf('RESONAN')>=0||s.indexOf('RESONADOR')>=0||s.indexOf('IRM')>=0;
    if(rm){asignaciones[p.orden]='medina';acum.medina+=(p.codigos?p.codigos.length:1);return;}
    var nCods=p.codigos?p.codigos.length:1;
    var total=acum.ortega+acum.medina+acum.arevalo+0.001;
    var defO=0.44-acum.ortega/total;
    var defM=0.30-acum.medina/total;
    var defA=0.26-acum.arevalo/total;
    var elegido;
    if(defO>=defM&&defO>=defA)elegido='ortega';
    else if(defM>=defO&&defM>=defA)elegido='medina';
    else elegido='arevalo';
    asignaciones[p.orden]=elegido;
    acum[elegido]+=nCods;
  });

  Object.keys(overrides).forEach(function(k){asignaciones[k]=overrides[k];});
  renderAdmin('estudios');
  await saveAsignaciones();
}

async function guardar(){
  var orden=document.getElementById('fo').value.trim();

  if(!orden){msg.innerHTML='<span class="msg-err">El Nº de Orden es obligatorio</span>';return;}

  var fv=document.getElementById('ff').value,fd=fv;
  if(fv){var parts=fv.split('-');fd=parts[2]+'/'+parts[1]+'/'+parts[0].slice(2);}
  var med=document.getElementById('fm').value;
  var nuevo={orden:orden,fecha:fd,nombre:document.getElementById('fn').value||'—',servicio:document.getElementById('fs').value||'',atencion:document.getElementById('fa').value||''};

  await saveAsignaciones();
  msg.innerHTML='<span class="msg-ok">✓ Guardado y sincronizado</span>';
  setTimeout(function(){renderAdmin('estudios');},900);
}

    _renderMedicoInner(u, med);
  }).catch(function(){ _renderMedicoInner(u, med); });

function _renderMedicoInner(u, med){
  // Incluir asignados al médico + extras informados que guardó Firebase
  var mis=pacientes.filter(function(p){
    return asignaciones[p.orden]===med.id || (estadoMap[p.orden]==='informado' && !asignaciones[p.orden]);
  });
  var pend=mis.filter(function(p){return p.estado!=='informado';}).length;
  // Tabla pendientes
  var rows='';
  mis.forEach(function(p){
    if(p.estado==='informado') return;
    rows+='<tr><td><b>'+p.orden+'</b></td><td style="color:#666">'+p.fecha+'</td><td>'+p.nombre+'</td><td style="color:#666;font-size:12px">'+p.servicio+'</td><td style="text-align:center"><span class="badge b-sin">'+(p.codigos?p.codigos.length:0)+'</span></td><td>'+ab(p.atencion)+'</td><td>'+(p.estado==='informado'?'<span class="badge b-ok">Informado</span>':'<span class="badge b-sin">Pendiente</span>')+'</td><td style="display:flex;gap:6px;align-items:center">'+(p.estado!=='informado'?'<button class="btn-informar" onclick="abrirInformar(\''+p.orden+'\')">+ Informar</button>':'<span style="font-size:12px;color:#1a7a4a">Completado</span>')+'</td></tr>';
  });
  // Tabla informados — ordenada por fecha descendente (más reciente primero)
  var informados=mis.filter(function(p){return p.estado==='informado';});
  informados.sort(function(a,b){
    // fecha formato DD/MM/YY → convertir a numero comparable
    function toNum(f){ var p=f.split('/'); return parseInt(p[2])*10000+parseInt(p[1])*100+parseInt(p[0]); }
    return toNum(b.fecha)-toNum(a.fecha);
  });
  var totalRegInf=informados.reduce(function(a,p){return a+(p.codigos?p.codigos.length:0);},0);
  var rowsInf='';
  informados.forEach(function(p){
    rowsInf+='<tr><td style="color:#666">'+p.fecha+'</td><td><b>'+p.nombre+'</b></td><td style="color:#666;font-size:12px">'+p.servicio+'</td><td style="text-align:center"><span class="badge b-ok">'+(p.codigos?p.codigos.length:0)+'</span></td></tr>';
  });
  var tablaInf=informados.length===0?'':'<div class="card" style="margin-top:1rem"><div class="card-header"><span class="card-title">Mis estudios informados</span><span style="font-size:12px;color:#1a7a4a;font-weight:bold">Pacientes: '+informados.length+' &nbsp;·&nbsp; Regiones: '+totalRegInf+'</span><input id="buscar-inf" type="text" placeholder="Buscar paciente..." style="padding:5px 10px;border:1px solid #ddd;border-radius:5px;font-size:13px;width:200px"></div><div class="tbl-wrap"><table id="tabla-inf"><thead><tr><th>Fecha</th><th>Paciente</th><th>Servicio</th><th>Reg.</th></tr></thead><tbody>'+rowsInf+'</tbody></table></div></div>';
    var infCount=informados.length;
  var infReg=totalRegInf;
  var pendReg=mis.filter(function(p){return p.estado!=='informado';}).reduce(function(a,p){return a+(p.codigos?p.codigos.length:0);},0);
  // Calcular conteo por mes para el botón
  var mesesNombres=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  var hoy=new Date();
  var mmAct=String(hoy.getMonth()+1).padStart(2,'0');
  var yyAct=String(hoy.getFullYear()).slice(2);
  var mmAnt=String(hoy.getMonth()===0?12:hoy.getMonth()).padStart(2,'0');
  var yyAnt=hoy.getMonth()===0?String(hoy.getFullYear()-1).slice(2):yyAct;
  function contarMes(mm,yy){
    var pacs=informados.filter(function(p){var f=p.fecha.split('/');return f[1]===mm&&f[2]===yy;});
    return {pac:pacs.length,reg:pacs.reduce(function(a,p){return a+(p.codigos?p.codigos.length:0);},0)};
  }
  var cAct=contarMes(mmAct,yyAct);
  var cAnt=contarMes(mmAnt,yyAnt);
  var nomAct=mesesNombres[parseInt(mmAct)-1];
  var nomAnt=mesesNombres[parseInt(mmAnt)-1];
  var btnAct=cAct.pac>0?'<button onclick="renderInformados(\'' +mmAct+'/'+yyAct+ '\')" style="width:100%;background:#e6f5ed;border:1px solid #1a7a4a;border-radius:8px;padding:10px 8px;font-size:12px;color:#1a7a4a;cursor:pointer;text-align:center;line-height:1.6;margin-bottom:6px"><b>'+nomAct+'</b><br>'+cAct.pac+' pac · '+cAct.reg+' reg</button>':'';
  var btnAnt=cAnt.pac>0?'<button onclick="renderInformados(\'' +mmAnt+'/'+yyAnt+ '\')" style="width:100%;background:#f0f8f4;border:1px solid #a0c8b0;border-radius:8px;padding:10px 8px;font-size:12px;color:#1a7a4a;cursor:pointer;text-align:center;line-height:1.6;margin-bottom:6px"><b>'+nomAnt+'</b><br>'+cAnt.pac+' pac · '+cAnt.reg+' reg</button>':'';
  var verLink=infCount>0?'<div style="text-align:center;font-size:11px;color:#888;margin-top:2px">Ver informados →</div>':'';
  var btnInf=infCount>0?btnAct+btnAnt+verLink:'';
  var headerAsignados='<div class="card"><div class="card-header"><span class="card-title">Mis estudios asignados</span><span style="font-size:13px;color:#666">Pacientes: <b>'+pend+'</b>  ·  Regiones: <b>'+pendReg+'</b></span><input id="buscar-med" type="text" placeholder="Buscar paciente..." style="padding:5px 10px;border:1px solid #ddd;border-radius:5px;font-size:13px;width:200px;margin-left:auto"></div>';
document.getElementById('root').innerHTML=topbar(med.nombre,med.ini,med.av)+
  '<div class="main">'+syncBanner()+'<div class="banner">Hacé clic en <b>+ Informar</b> para abrir el estudio. Al cerrar la ventana del RIS se te preguntará si ya lo informaste.</div>'+
  '<div style="position:relative">'+
  (btnInf?'<div style="position:absolute;left:-200px;top:0;width:185px">'+btnInf+'</div>':'')+
  headerAsignados+(mis.length===0?'<div class="empty">No tenés estudios asignados.<br>Consultá con el administrador.</div>':'<div class="tbl-wrap"><table id="tabla-med"><thead><tr><th>Orden</th><th>Fecha</th><th>Paciente</th><th>Servicio</th><th>Reg.</th><th>Atención</th><th>Estado</th><th>Acción</th></tr></thead><tbody>'+rows+'</tbody></table></div>')+'</div></div></div></div>';
}

function renderInformados(filtroMes){
  var u=UROLES[currentUser];
  var med=MEDICOS[u.idx];
  pacientes.forEach(function(p){ p.estado = estadoMap[p.orden] || ''; });
  // Incluir informados asignados al médico + informados guardados en Firebase (pacientes_extra)
  var todos=pacientes.filter(function(p){
    return p.estado==='informado' && (asignaciones[p.orden]===med.id || (!asignaciones[p.orden] && estadoMap[p.orden]==='informado'));
  });
  // Filtrar por mes si se especifica (formato MM/YY)
  var informados = filtroMes ? todos.filter(function(p){
    var f=p.fecha.split('/'); return f[1]+'/'+f[2] === filtroMes;
  }) : todos;
  informados.sort(function(a,b){
    function toNum(f){ var p=f.split('/'); return parseInt(p[2])*10000+parseInt(p[1])*100+parseInt(p[0]); }
    return toNum(b.fecha)-toNum(a.fecha);
  });
  var totalReg=informados.reduce(function(a,p){return a+(p.codigos?p.codigos.length:0);},0);
  var rows='';
  informados.forEach(function(p){
    rows+='<tr><td style="color:#666">'+p.fecha+'</td><td><b>'+p.nombre+'</b></td><td style="color:#666;font-size:12px">'+p.servicio+'</td><td style="text-align:center"><span class="badge b-ok">'+(p.codigos?p.codigos.length:0)+'</span></td></tr>';
  });
  document.getElementById('root').innerHTML=topbar(med.nombre,med.ini,med.av)+
  '<div class="main">'+syncBanner()+
  '<div class="card"><div class="card-header" style="display:flex;align-items:center;gap:12px">'+
  '<button onclick="renderMedico()" style="background:none;border:none;cursor:pointer;font-size:18px;color:#666" title="Volver">&#8592;</button>'+
  '<span class="card-title">Mis estudios informados</span>'+
  (function(){
    // Construir opciones de mes
    var mesesMap={};
    todos.forEach(function(p){var f=p.fecha.split('/');var k=f[1]+'/'+f[2];mesesMap[k]=1;});
    var opts='<option value="">Todos</option>';
    var mesesNombres=['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    Object.keys(mesesMap).sort().reverse().forEach(function(k){
      var mm=parseInt(k.split('/')[0]);
      var yy=k.split('/')[1];
      var sel=filtroMes===k?' selected':'';
      opts+='<option value="'+k+'"'+sel+'>'+mesesNombres[mm]+' 20'+yy+'</option>';
    });
    return '<select onchange="renderInformados(this.value)" style="padding:4px 8px;border:1px solid #ddd;border-radius:5px;font-size:12px;color:#1a7a4a">'+opts+'</select>';
  })()+
  '<span style="font-size:13px;color:#1a7a4a;font-weight:bold">Pacientes: '+informados.length+' &nbsp;·&nbsp; Regiones: '+totalReg+'</span>'+
  '<input id="buscar-inf2" type="text" placeholder="Buscar paciente..." style="padding:5px 10px;border:1px solid #ddd;border-radius:5px;font-size:13px;width:200px;margin-left:auto">'+
  '</div>'+
  (informados.length===0?'<div class="empty">No hay estudios informados aún.</div>':'<div class="tbl-wrap"><table id="tabla-inf2"><thead><tr><th>Fecha</th><th>Paciente</th><th>Servicio</th><th>Reg.</th></tr></thead><tbody>'+rows+'</tbody></table></div>')+
  '</div></div>';
}

async function marcar(orden){
  var p=pacientes.filter(function(x){return x.orden===orden;})[0];
  if(p) p.estado='informado';
  estadoMap[orden]='informado'; // actualizar el mapa antes de renderizar
  renderMedico();
  await saveEstado(orden,'informado');
  await saveInformadoEnFirebase(p);
}

function logout(){
  currentUser=null;
  if(unsubscribe){unsubscribe();unsubscribe=null;}
  renderLogin();
}

function abrirInformar(orden){
  var url=BASE+orden+'/';
  var w=window.open(url,'_blank','width=1200,height=850,scrollbars=yes');
  if(!w){window.open(url,'_blank');return;}
  // Detectar cuando el médico cierra la ventana del RIS
  var check=setInterval(async function(){
    if(w.closed){
      clearInterval(check);
      // Mostrar diálogo de confirmación
      var p=pacientes.filter(function(x){return x.orden===orden;})[0];
      var nombre=p?p.nombre:'este estudio';
      // Crear modal de confirmación
      var overlay=document.createElement('div');
      overlay.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center;';
      overlay.innerHTML='<div style="background:#fff;border-radius:10px;padding:2rem;max-width:420px;width:90%;box-shadow:0 10px 40px rgba(0,0,0,0.3)">'+
        '<div style="font-size:15px;font-weight:bold;margin-bottom:8px">¿Terminaste el informe?</div>'+
        '<div style="font-size:13px;color:#666;margin-bottom:1.5rem"><b>'+nombre+'</b><br>Si cerraste sin informar, hacé clic en <b>No</b>.</div>'+
        '<div style="display:flex;gap:10px">'+
        '<button id="btn-si" style="flex:1;padding:10px;background:#1a7a4a;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:bold;cursor:pointer">✓ Sí, ya lo informé</button>'+
        '<button id="btn-no" style="flex:1;padding:10px;background:#f0f0ee;color:#333;border:1px solid #ccc;border-radius:6px;font-size:14px;cursor:pointer">No, volver a la lista</button>'+
        '</div></div>';
      document.body.appendChild(overlay);
      document.getElementById('btn-si').onclick=async function(){
        document.body.removeChild(overlay);
        // Guardar referencia ANTES de modificar
        var pp=pacientes.filter(function(x){return x.orden===orden;})[0];
        // Actualizar estado en lugar de eliminar
        if(pp) pp.estado='informado';
        estadoMap[orden]='informado';
        // Guardar en Firebase
        await saveEstado(orden,'informado');
        await saveInformadoEnFirebase(pp);
        // Rerenderizar
        if(currentUser&&UROLES[currentUser].rol==='admin') renderAdmin(currentAdminTab);
        else if(currentUser) renderMedico();
      };
      document.getElementById('btn-no').onclick=function(){
        document.body.removeChild(overlay);
      };
    }
  },1000);
}

// ── Exponer funciones globales ───────────────────────────────────────────────
window.doLogin=doLogin;
window.pi=pi;
// Exponer estado global para debugging
Object.defineProperty(window,'_estadoMap',{get:function(){return estadoMap;},set:function(v){estadoMap=v;}});
Object.defineProperty(window,'_pacientes',{get:function(){return pacientes;}});
Object.defineProperty(window,'_asignaciones',{get:function(){return asignaciones;}});
window.pk=pk;
window.logout=logout;
window.renderAdmin=renderAdmin;
window.reasignar=reasignar;
window.reaplicar=reaplicar;
window.guardar=guardar;
window.marcar=marcar;
window.renderInformados=renderInformados;
window.renderMedico=renderMedico;
window.abrirInformar=abrirInformar;

// ── Iniciar ──────────────────────────────────────────────────────────────────
renderLogin();
// Exponer funciones al scope global para debugging
window._reaplicar = reaplicar;
window._autoAsignar = autoAsignar;
window._getPacientes = function(){ return pacientes; };
window._getAsignaciones = function(){ return asignaciones; };
</script>
